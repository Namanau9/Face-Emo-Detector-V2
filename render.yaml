services:
  - type: web
    name: face-emotion-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_PATH
        value: ../saved_model/emotion_model.keras
      - key: LABELS_PATH
        value: ../saved_model/labels.json
      - key: IMAGE_SIZE
        value: "128"
      - key: CONFIDENCE_THRESHOLD
        value: "0.30"
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.onrender.com,http://localhost:3000
  - type: web
    name: face-emotion-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://your-backend-domain.onrender.com
